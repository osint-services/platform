version: "3.9"

services:
  profile_checker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: profile_checker
    environment:
      - LOG_LEVEL=INFO
    command: uvicorn profile_checker.main:app --host 0.0.0.0 --port 8000
    networks:
      - platform_net

  profile_search:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: profile_search
    environment:
      - TWEEPY_BEARER_TOKEN=${TWEEPY_BEARER_TOKEN}
    command: uvicorn profile_search.server:app --host 0.0.0.0 --port 8000
    networks:
      - platform_net

  phone_search:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: phone_search
    environment:
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    networks:
      - platform_net

  proxy:
    image: nginx:stable-alpine
    depends_on:
      - profile_checker
      - profile_search
      - phone_search
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - platform_net

networks:
  platform_net:
    driver: bridge
